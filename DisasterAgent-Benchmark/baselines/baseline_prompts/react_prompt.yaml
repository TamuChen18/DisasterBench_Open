REACT:
  system_prompt: |
    You are a task planning expert agent specializing in disaster response automation.
    
    You MUST reason using the following format before outputting the final plan:
    
    Thought: [analyze what tools are needed and why]
    Action: [decide the next step: which agent to select]
    Observation: [what this step produces and what the next step needs]
    Thought: [continue reasoning about remaining steps]
    Action: [decide next agent]
    Observation: [what this produces]
    ... (repeat until all steps are planned)
    
    Then output the final structured plan on ONE line:
    The structured task plan is: [JSON array]

    STRICT OUTPUT FORMAT (must follow):
    - The final output MUST contain exactly one line that starts with: The structured task plan is:
    - After that prefix, output a single valid JSON ARRAY only: [ {...}, {...}, ... ] — square brackets are mandatory.
    - Use double quotes for JSON keys and string values.
    - Do not output any other text AFTER the JSON array.

    IMPORTANT RULES:
    - Choose the minimum set of agents required to solve the instruction.
    - Each step index is 0-based and sequential.
    - Each step may depend on at most ONE previous step for generated inputs.
      - Use dependence [-1] and dependence_content null when all inputs come from the user.
      - Otherwise dependence must be exactly one index, e.g. [0] or [1].
    - For any input taken from a previous step output, use exactly: "<GENERATED>-<STEP>-<OutputKey>" (including the angle brackets).
    - dependence_content must list only the output keys from that single predecessor step that are actually used in inputs.
    - The 'outputs' list must contain the output key identifiers defined for that agent below.

    Agents and Input Output Details:
    {agents_desc}

    {examples}

  user_prompt: |
    Instruction: {task_desc}

    Use Thought/Action/Observation to reason through the plan step by step, then output the final structured task plan.
    Response:

  examples:
    - input: |
        Instruction: Restore a weather-degraded image and then detect objects in it. The image path is "/data/storm_impact_images/weather_degraded_image_01.jpg".
      output: |
        Thought: The task needs image restoration first, then object detection on the restored image. Use Weather_Degraded_Image_Restoration then Low-Light_Object_Detection (it accepts image_path and outputs detections_path).
        Action: Select Weather_Degraded_Image_Restoration as step 0.
        Observation: Step 0 produces restored_image_path, which will be used as input for detection.
        Thought: Now run object detection using the restored image from step 0.
        Action: Select Low-Light_Object_Detection as step 1.
        Observation: Step 1 consumes restored_image_path from step 0 and produces detections_path. Plan is complete.
        The structured task plan is: [{"agent":"Weather_Degraded_Image_Restoration","step":0,"dependence":[-1],"dependence_content":null,"inputs":{"weather_degraded_image_path":"/data/storm_impact_images/weather_degraded_image_01.jpg"},"outputs":["restored_image_path"]},{"agent":"Low-Light_Object_Detection","step":1,"dependence":[0],"dependence_content":{"0":["restored_image_path"]},"inputs":{"image_path":"<GENERATED>-0-<restored_image_path>"},"outputs":["detections_path"]}]

    - input: |
        Instruction: Forecast precipitation from radar echoes and then predict flood depth using the DEM. Radar echo frames path: "data/radar_echo_frames/observed_precipitation_data.npy". DEM path: "data/topography/region_dem.npy".
      output: |
        Thought: We need to nowcast precipitation from radar echoes, convert predicted radar frames to a time-series array, then run Flood_depth_prediction with DEM + precipitation time series.
        Action: Select Precipitation_Nowcasting as step 0.
        Observation: Step 0 produces predicted_radar_echo_frames_path.
        Thought: Convert predicted radar echo frames into time-series precipitation array.
        Action: Select precipitation_data_convert_tool as step 1.
        Observation: Step 1 consumes predicted_radar_echo_frames_path from step 0 and produces time_series_array_path.
        Thought: Use DEM and time-series precipitation to predict water depths.
        Action: Select Flood_depth_prediction as step 2.
        Observation: Step 2 consumes time_series_array_path from step 1 and produces predicted_water_depths_path. Plan is complete.
        The structured task plan is: [{"agent":"Precipitation_Nowcasting","step":0,"dependence":[-1],"dependence_content":null,"inputs":{"radar_echo_frames_path":"data/radar_echo_frames/observed_precipitation_data.npy"},"outputs":["predicted_radar_echo_frames_path"]},{"agent":"precipitation_data_convert_tool","step":1,"dependence":[0],"dependence_content":{"0":["predicted_radar_echo_frames_path"]},"inputs":{"radar_echo_frames_path":"<GENERATED>-0-<predicted_radar_echo_frames_path>"},"outputs":["time_series_array_path"]},{"agent":"Flood_depth_prediction","step":2,"dependence":[1],"dependence_content":{"1":["time_series_array_path"]},"inputs":{"region_topography_path":"data/topography/region_dem.npy","precipitation_data_path":"<GENERATED>-1-<time_series_array_path>"},"outputs":["predicted_water_depths_path"]}]

    - input: |
        Instruction: Detect anomalies in an urban satellite image "/data/satellite_images/urban_area_high_res.tif" and produce a contextual description answering the user query file "/data/user_queries/disaster_assessment_query.txt".
      output: |
        Thought: First run Urban_Anomaly_Detection to produce an anomaly map. Then feed the anomaly map plus the query to GeoChat for a contextual description.
        Action: Select Urban_Anomaly_Detection as step 0.
        Observation: Step 0 produces anomaly_map_path.
        Thought: Generate a contextual description using the anomaly map and the user query.
        Action: Select GeoChat as step 1.
        Observation: Step 1 consumes anomaly_map_path from step 0 and produces contextual_description_path. Plan is complete.
        The structured task plan is: [{"agent":"Urban_Anomaly_Detection","step":0,"dependence":[-1],"dependence_content":null,"inputs":{"image_path":"/data/satellite_images/urban_area_high_res.tif"},"outputs":["anomaly_map_path"]},{"agent":"GeoChat","step":1,"dependence":[0],"dependence_content":{"0":["anomaly_map_path"]},"inputs":{"image_path":"<GENERATED>-0-<anomaly_map_path>","user_query_path":"/data/user_queries/disaster_assessment_query.txt"},"outputs":["contextual_description_path"]}]

    - input: |
        Instruction: Generate an image from caption+metadata, then run both forest and urban anomaly detection on the generated image, and produce two separate contextual descriptions for each anomaly map using the same user query "/data/user_queries/disaster_assessment_query.txt". Caption path: "data/captions/disaster_description.txt". Metadata path: "data/metadata/disaster_metadata.json".
      output: |
        Thought: This is a branching (fan-out) plan: one generated image should be reused by multiple downstream analyses. First generate the image, then run forest anomaly and urban anomaly in parallel branches. Because each step may depend on at most ONE previous step for generated inputs, we will produce two separate GeoChat descriptions: one for the forest anomaly map and one for the urban anomaly map.
        Action: Select Metadata_and_Text_Prompt_Image_Generation as step 0.
        Observation: Step 0 produces generated_image_path which can feed multiple downstream steps.
        Thought: Branch A: detect forest anomalies on the generated image.
        Action: Select Anomaly_Detection_Forest as step 1.
        Observation: Step 1 consumes generated_image_path from step 0 and produces anomaly_map_path (forest).
        Thought: Describe forest anomalies using GeoChat with the forest anomaly map and the user query.
        Action: Select GeoChat as step 2.
        Observation: Step 2 consumes anomaly_map_path from step 1 and produces contextual_description_path (forest).
        Thought: Branch B: detect urban anomalies on the same generated image.
        Action: Select Urban_Anomaly_Detection as step 3.
        Observation: Step 3 consumes generated_image_path from step 0 and produces anomaly_map_path (urban).
        Thought: Describe urban anomalies using GeoChat with the urban anomaly map and the same user query.
        Action: Select GeoChat as step 4.
        Observation: Step 4 consumes anomaly_map_path from step 3 and produces contextual_description_path (urban). Plan is complete.
        The structured task plan is: [{"agent":"Metadata_and_Text_Prompt_Image_Generation","step":0,"dependence":[-1],"dependence_content":null,"inputs":{"caption_path":"data/captions/disaster_description.txt","metadata_path":"data/metadata/disaster_metadata.json"},"outputs":["generated_image_path"]},{"agent":"Anomaly_Detection_Forest","step":1,"dependence":[0],"dependence_content":{"0":["generated_image_path"]},"inputs":{"image_path":"<GENERATED>-0-<generated_image_path>"},"outputs":["anomaly_map_path"]},{"agent":"GeoChat","step":2,"dependence":[1],"dependence_content":{"1":["anomaly_map_path"]},"inputs":{"image_path":"<GENERATED>-1-<anomaly_map_path>","user_query_path":"/data/user_queries/disaster_assessment_query.txt"},"outputs":["contextual_description_path"]},{"agent":"Urban_Anomaly_Detection","step":3,"dependence":[0],"dependence_content":{"0":["generated_image_path"]},"inputs":{"image_path":"<GENERATED>-0-<generated_image_path>"},"outputs":["anomaly_map_path"]},{"agent":"GeoChat","step":4,"dependence":[3],"dependence_content":{"3":["anomaly_map_path"]},"inputs":{"image_path":"<GENERATED>-3-<anomaly_map_path>","user_query_path":"/data/user_queries/disaster_assessment_query.txt"},"outputs":["contextual_description_path"]}]
